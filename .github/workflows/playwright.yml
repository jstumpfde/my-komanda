name: Playwright E2E

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: Target environment
        options:
          - staging
          - production
        default: staging

jobs:
  test:
    name: Smoke tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          # На push/PR — гоним против staging. workflow_dispatch может
          # переключить на production (single dropdown).
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.target == 'production' && 'https://company24.pro' || 'https://new.company24.pro' }}
          PLAYWRIGHT_HR_PASSWORD: ${{ secrets.PLAYWRIGHT_HR_PASSWORD }}
          PLAYWRIGHT_DIRECTOR_PASSWORD: ${{ secrets.PLAYWRIGHT_DIRECTOR_PASSWORD }}
          PLAYWRIGHT_HTTP_USER: ${{ secrets.PLAYWRIGHT_HTTP_USER }}
          PLAYWRIGHT_HTTP_PASSWORD: ${{ secrets.PLAYWRIGHT_HTTP_PASSWORD }}
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
