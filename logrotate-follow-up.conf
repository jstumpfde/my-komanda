# logrotate-конфиг для логов cron /api/cron/follow-up.
#
# Cron пишет одну JSON-строку на каждый тик (см. console.log в
# app/api/cron/follow-up/route.ts:18-22):
#   {"tag":"cron/follow-up","processed":N,"sent":N,"cancelled":N,
#    "failed":N,"skipped":N,"durationMs":N,"ts":"ISO"}
#
# Лог пишется через pm2-перенаправление stdout или через прямой
# `>> /var/log/follow-up.log` в systemd-таймере / crontab. Файл может
# расти неконтролируемо — отсюда logrotate.
#
# Установка на сервере (выполняет Юрий):
#   sudo cp logrotate-follow-up.conf /etc/logrotate.d/follow-up
#   sudo chmod 644 /etc/logrotate.d/follow-up
#   sudo logrotate -d /etc/logrotate.d/follow-up   # dry-run, проверка
#   sudo logrotate /etc/logrotate.d/follow-up      # force rotate один раз
#
# Параметры:
#   su root root — явно указываем владельца ротации; нужно потому что
#                  /var/log на этом сервере имеет group-writable permissions,
#                  иначе logrotate отказывается работать с предупреждением
#                  «insecure permissions»
#   daily        — ротация раз в сутки
#   rotate 7     — храним 7 архивов = неделя истории
#   compress     — старые архивы gzip'нуты (≈10× компрессия для JSON-строк)
#   missingok    — не падать, если log файла ещё нет (первый запуск)
#   notifempty   — не ротировать пустой файл
#   copytruncate — копируем + truncate, чтобы не пересоздавать inode
#                  (cron пишет через append, дескриптор не переоткрывается)

/var/log/follow-up.log {
    su root root
    daily
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}
