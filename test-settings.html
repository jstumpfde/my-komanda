<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .header { background: #f8f9fa; padding: 16px; border-bottom: 1px solid #e9ecef; margin: -20px -20px 20px -20px; }
        .nav { display: flex; gap: 8px; margin-bottom: 16px; }
        .nav-link { padding: 8px 16px; text-decoration: none; color: #6c757d; border-bottom: 2px solid transparent; }
        .nav-link.active { color: #007bff; border-bottom-color: #007bff; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 32px; height: 32px; background: #007bff; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="#" class="nav-link active">Компания</a>
            <a href="#" class="nav-link">Профиль</a>
            <a href="#" class="nav-link">Команда</a>
            <a href="#" class="nav-link">Тариф</a>
            <a href="#" class="nav-link">Интеграции</a>
            <a href="#" class="nav-link">Расписание</a>
            <a href="#" class="nav-link">Уведомления</a>
        </nav>
        <div class="user-info">
            <div class="avatar">П</div>
            <span>Пользователь</span>
        </div>
    </header>

    <main>
        <h1>Настройки</h1>
        <p>Навигация и пользователь отображаются правильно!</p>
    </main>
</body>
</html>
